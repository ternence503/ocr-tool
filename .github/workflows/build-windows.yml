name: Build Windows Installer

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install NSIS
        run: choco install nsis -y

      - name: Copy source files to installer dir
        shell: cmd
        run: |
          copy ocr.py installer\windows\
          copy ocr_ui.py installer\windows\
          copy "安裝（Windows）.bat" "installer\windows\安裝（Windows）.bat"
          copy "OCR辨識工具（Windows）.bat" "installer\windows\OCR辨識工具（Windows）.bat"

      - name: Build installer
        shell: cmd
        run: makensis installer.nsi
        working-directory: installer\windows

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: cmd
        run: gh release upload v1.0.0 installer\windows\ocr-tool-windows.exe --clobber
