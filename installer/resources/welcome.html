<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    margin: 0;
    padding: 24px 28px;
    color: #1d1d1f;
    background: #ffffff;
    font-size: 13px;
    line-height: 1.6;
  }
  h2 {
    font-size: 17px;
    font-weight: 600;
    margin: 0 0 12px;
    color: #1e73dc;
  }
  p { margin: 0 0 10px; }
  .req {
    background: #f5f5f7;
    border-radius: 8px;
    padding: 12px 16px;
    margin: 14px 0;
  }
  .req h3 {
    font-size: 12px;
    font-weight: 600;
    margin: 0 0 6px;
    color: #6e6e73;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .req a { color: #1e73dc; }
  .time {
    background: #fff8e6;
    border-left: 3px solid #f5a623;
    border-radius: 0 6px 6px 0;
    padding: 10px 14px;
    margin-top: 14px;
    font-size: 12px;
    color: #7a5f00;
  }

  @media (prefers-color-scheme: dark) {
    body {
      color: #f5f5f7;
      background: #1c1c1e;
    }
    h2 { color: #4da3ff; }
    .req {
      background: #2c2c2e;
    }
    .req h3 { color: #98989d; }
    .req a { color: #4da3ff; }
    .time {
      background: #2c2200;
      border-left-color: #f5a623;
      color: #ffd060;
    }
  }
</style>
</head>
<body>
  <h2>OCR 辨識工具 安裝精靈</h2>
  <p>本工具可將圖片或 PDF 中的文字辨識成可複製的文字，支援繁簡中文、日文、英文。</p>
  <p>安裝完成後，<strong>OCR 辨識工具</strong>將出現在「應用程式」資料夾，並可從 Launchpad 或 Spotlight 搜尋啟動。</p>

  <div class="req">
    <h3>安裝前請確認</h3>
    <p>需要 <strong>Python 3.8–3.12</strong>（不支援 3.13 以上）</p>
    <p>尚未安裝請先前往：<a href="https://www.python.org/downloads/release/python-3129/">python.org 下載 Python 3.12</a></p>
  </div>

  <div class="time">
    ⏱ 安裝過程需下載套件與辨識模型，<strong>約需 5–15 分鐘</strong>，請保持網路連線。
  </div>
</body>
</html>
